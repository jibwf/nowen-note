name: 💬 使用咨询
description: 询问安装、部署、配置或使用方法
title: "[Question] "
body:
  - type: markdown
    attributes:
      value: |
        此表单用于无法通过文档或现有 Issue 解决的使用问题。若你遇到可复现的软件异常，请改用「Bug 反馈」。

  - type: dropdown
    id: question_type
    attributes:
      label: 咨询类型
      options:
        - 安装 / 升级
        - Docker 部署
        - Electron 桌面端
        - 反向代理 / 域名 / HTTPS
        - 数据导入 / 导出 / 迁移
        - 同步与多端使用
        - 用户 / 权限 / 协作
        - AI 服务配置
        - 功能使用方法
        - 其他
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: 具体问题
      description: 请说明你想完成什么、目前卡在哪一步
      placeholder: 我正在尝试……，但在……步骤遇到了问题。
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: 已尝试的方法
      description: 可填写查阅过的文档、执行过的命令或已经排除的原因
      placeholder: 我已经尝试……，结果是……

  - type: dropdown
    id: deployment
    attributes:
      label: 使用方式
      options:
        - Docker / 自建服务
        - Electron 桌面端
        - Web 浏览器
        - 移动端浏览器
        - 尚未安装
        - 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Nowen Note 版本（可选）
      placeholder: 例如：v1.3.1

  - type: input
    id: environment
    attributes:
      label: 系统与环境（可选）
      description: 例如操作系统、浏览器、Docker 版本、反向代理等
      placeholder: 例如：Windows 11 / Docker 27 / Chrome 150

  - type: textarea
    id: config
    attributes:
      label: 相关配置或命令（可选）
      description: 提交前请移除密码、密钥、Token、Cookie、数据库连接串等敏感信息
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: 截图或日志（可选）
      description: 可直接拖拽截图或粘贴日志；请先移除敏感信息

  - type: checkboxes
    id: confirmation
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索 README、文档和现有 Issue，但没有找到答案
          required: true
        - label: 我已移除配置、日志和截图中的密码、密钥、Token、Cookie 等敏感信息
          required: true
