name: Issue 322 main implementation

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/issue-322-main-implementation.yml

permissions:
  contents: write
  issues: write

jobs:
  implement:
    if: github.event.head_commit.message == 'chore(ci): run issue #322 implementation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - id: apply
        name: Apply staged patches
        run: |
          git apply --verbose --check .github/issue322/*.patch
          git apply --verbose .github/issue322/*.patch
          git diff --check

      - id: install
        name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - id: validate
        name: Validate frontend
        working-directory: frontend
        run: |
          npm run lint
          npm run build
          npm run test:run

      - id: commit
        name: Commit directly to main
        run: |
          rm -rf .github/issue322
          rm -f .github/workflows/issue-322-main-implementation.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(editor): resolve list rendering regressions (#322)"
          git push origin HEAD:main

      - name: Report workflow status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment 322 --repo "$GITHUB_REPOSITORY" --body "Issue #322 implementation run $GITHUB_RUN_ID finished with status ${{ job.status }}; apply=${{ steps.apply.outcome }}, install=${{ steps.install.outcome }}, validate=${{ steps.validate.outcome }}, commit=${{ steps.commit.outcome }}."
