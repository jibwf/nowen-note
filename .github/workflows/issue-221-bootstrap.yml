name: Issue 221 Bootstrap

on:
  push:
    branches:
      - implementation/issue-221-image-export

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: implementation/issue-221-image-export
      - name: Integrate image export center
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('frontend/src/lib/exportService.ts')
          text = path.read_text(encoding='utf-8-sig')

          text = text.replace(
              'import { markdownToHtml } from "@/lib/contentFormat";',
              'import { detectFormat, markdownToHtml } from "@/lib/contentFormat";',
              1,
          )

          old_detect = '''export function noteContentToExportHtml(
            rawContent: string,
            contentText: string,
            contentFormat?: string,
          ): string {
            if (contentFormat === "markdown") {
              return markdownToHtml(rawContent || contentText || "");
            }
            return noteContentToHtml(rawContent, contentText);
          }'''
          new_detect = '''export function noteContentToExportHtml(
            rawContent: string,
            contentText: string,
            contentFormat?: string,
          ): string {
            const source = rawContent || contentText || "";
            const detected = detectFormat(source);
            if (contentFormat === "markdown" || detected === "md") {
              return markdownToHtml(source);
            }
            return noteContentToHtml(rawContent, contentText);
          }'''
          if old_detect not in text:
              raise SystemExit('noteContentToExportHtml block not found')
          text = text.replace(old_detect, new_detect, 1)

          private_inline = 'async function inlineRemoteImages(\n'
          if private_inline not in text:
              raise SystemExit('inlineRemoteImages declaration not found')
          text = text.replace(private_inline, 'export async function inlineRemoteImages(\n', 1)

          image_start = text.index('export async function exportSingleNoteAsImage(noteId: string): Promise<boolean> {')
          marker = text.index('// ========== NOTE-IMAGE-EXPORT-01', image_start)
          replacement = '''export async function exportSingleNoteAsImage(noteId: string): Promise<boolean> {
            try {
              const note = await api.getNote(noteId);
              const { requestNoteImageExport } = await import("./noteImageExportBridge");
              return await requestNoteImageExport({
                id: note.id,
                title: note.title,
                content: note.content,
                contentText: note.contentText,
                contentFormat: note.contentFormat,
                createdAt: note.createdAt,
                updatedAt: note.updatedAt,
              }, { format: "png" });
            } catch (error) {
              console.error("导出图片失败:", error);
              return false;
            }
          }

          // ========== NOTE-IMAGE-EXPORT-01: faithful cross-platform export ==========

          export type NoteImageExportFormat = "png" | "jpg" | "svg";

          export interface ExportNoteImageOptions {
            format?: NoteImageExportFormat;
            quality?: number;
            pixelRatio?: number;
            layout?: "auto" | "long" | "pages";
            theme?: "current" | "light" | "dark";
            destination?: "download" | "gallery" | "files" | "share";
          }

          export async function exportNoteAsImage(
            note: {
              id: string;
              title: string;
              content: string;
              contentText: string;
              contentFormat?: string;
              createdAt?: string;
              updatedAt?: string;
            },
            options: ExportNoteImageOptions = {},
          ): Promise<boolean> {
            try {
              const { requestNoteImageExport } = await import("./noteImageExportBridge");
              return await requestNoteImageExport(note, options);
            } catch (error) {
              console.error("导出图片失败:", error);
              return false;
            }
          }
          '''
          text = text[:image_start] + replacement
          path.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/issue-221-bootstrap.yml')
          workflow.unlink()
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(export): route image exports through reliable preview renderer (#221)'
          git push origin HEAD:implementation/issue-221-image-export
