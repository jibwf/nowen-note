name: Fix Token Compatibility

on:
  push:
    branches: [main]
    paths:
      - .github/token-compatibility-trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Preserve compatibility and tag boundaries
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('backend/src/middleware/api-token-resource-scope.ts')
          text = path.read_text(encoding='utf-8')

          old = '''    if (required === "__unsupported__") {
      throw new ApiTokenAccessError(`API Token 未授权访问端点: ${c.req.path}`, "API_TOKEN_ENDPOINT_DENIED");
    }
    if (required) requireScope(ctx, required);

    if (ctx.resourceMode !== "restricted") {
'''
          new = '''    if (required === "__unsupported__") {
      if (ctx.resourceMode === "restricted") {
        throw new ApiTokenAccessError(`restricted Token 未授权访问端点: ${c.req.path}`, "API_TOKEN_ENDPOINT_DENIED");
      }
      await next();
      return;
    }
    if (required) requireScope(ctx, required);

    if (ctx.resourceMode !== "restricted") {
'''
          if old not in text:
              raise SystemExit('compatibility target not found')
          text = text.replace(old, new, 1)

          old = '''  if (path === "/api/tags" && method === "POST") {
    await next();
    return;
  }
  throw new ApiTokenAccessError("restricted Token 不允许修改全局标签；仅可增删作用域内笔记的标签关联");
'''
          new = '''  if (path === "/api/tags" && method === "POST") {
    throw new ApiTokenAccessError("restricted Token 不允许创建全局标签；仅可增删作用域内笔记的标签关联");
  }
  throw new ApiTokenAccessError("restricted Token 不允许修改全局标签；仅可增删作用域内笔记的标签关联");
'''
          if old not in text:
              raise SystemExit('restricted tag target not found')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/token-compatibility-trigger
          rm -f .github/workflows/fix-token-compatibility.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(auth): preserve compatibility and restricted boundaries"
          git push origin HEAD:main
