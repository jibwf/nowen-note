name: Apply WeChat Favorites Inline Guide

on:
  push:
    paths:
      - ".github/workflows/apply-wechat-favorites-inline-guide.yml"
      - ".github/scripts/apply-wechat-favorites-inline-guide.mjs"

permissions:
  contents: write

concurrency:
  group: wechat-favorites-inline-guide-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply inline guide
        run: node .github/scripts/apply-wechat-favorites-inline-guide.mjs

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Commit validated implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/scripts/apply-wechat-favorites-inline-guide.mjs
          rm -f .github/workflows/apply-wechat-favorites-inline-guide.yml
          git add -A
          git diff --cached --check
          git commit -m "feat(import): embed WeChat favorites export guide"
          git pull --rebase origin main
          git push origin HEAD:main
