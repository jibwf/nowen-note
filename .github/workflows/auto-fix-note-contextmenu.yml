      - name: Validate frontend
        run: |
          cd frontend
          npm install
          npx tsc -b
          npx vite build
      - name: Commit fix and remove temporary workflow
        run: |
          rm .github/workflows/auto-fix-note-contextmenu.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/components/Sidebar.tsx .github/workflows/auto-fix-note-contextmenu.yml
          git commit -m "fix: unify notebook tree note context menu (NOTEBOOK-TREE-NOTE-CONTEXTMENU-01)"
          git push
