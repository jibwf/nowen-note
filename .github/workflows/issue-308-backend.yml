name: Issue 308 Share Security

on:
  push:
    branches: [main]
    paths:
      - scripts/issue-308-backend.py
      - scripts/issue-308-fix1.py
      - scripts/issue-308-fix2.py
      - scripts/issue-308-post1.py
      - scripts/issue-308-post2.py
      - .github/workflows/issue-308-backend.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: issue-308-share-security-main
  cancel-in-progress: false

jobs:
  apply-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Apply, validate and commit
        shell: bash
        run: |
          set +e
          LOG=/tmp/issue-308-backend.log
          : > "$LOG"
          phase="align_patch"
          status=0

          echo "## $phase" | tee -a "$LOG"
          python scripts/issue-308-fix1.py >>"$LOG" 2>&1 || status=$?
          if [ "$status" -eq 0 ]; then python scripts/issue-308-fix2.py >>"$LOG" 2>&1 || status=$?; fi

          if [ "$status" -eq 0 ]; then
            phase="apply_patch"
            echo "## $phase" | tee -a "$LOG"
            python scripts/issue-308-backend.py >>"$LOG" 2>&1 || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            phase="post_patch"
            echo "## $phase" | tee -a "$LOG"
            python scripts/issue-308-post1.py >>"$LOG" 2>&1 || status=$?
            if [ "$status" -eq 0 ]; then python scripts/issue-308-post2.py >>"$LOG" 2>&1 || status=$?; fi
          fi
          if [ "$status" -eq 0 ]; then
            phase="npm_ci"
            echo "## $phase" | tee -a "$LOG"
            (cd backend && npm ci) >>"$LOG" 2>&1 || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            phase="typescript"
            echo "## $phase" | tee -a "$LOG"
            (cd backend && npm run build:tsc) >>"$LOG" 2>&1 || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            phase="tests_share_security"
            echo "## $phase" | tee -a "$LOG"
            (cd backend && node --import tsx --test tests/share-security-capabilities.test.ts) >>"$LOG" 2>&1 || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            phase="tests_attachment"
            echo "## $phase" | tee -a "$LOG"
            (cd backend && node --import tsx --test tests/attachment-shared-access.test.ts) >>"$LOG" 2>&1 || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            phase="tests_directory_acl"
            echo "## $phase" | tee -a "$LOG"
            (cd backend && node --import tsx --test tests/notebook-directory-permissions.test.ts) >>"$LOG" 2>&1 || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            phase="bundle"
            echo "## $phase" | tee -a "$LOG"
            (cd backend && npm run build) >>"$LOG" 2>&1 || status=$?
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            tail -n 350 "$LOG" >/tmp/issue-308-backend-tail.log
            git reset --hard HEAD
            python - "$phase" "$status" <<'PY'
          import json
          import pathlib
          import sys
          phase, status = sys.argv[1], int(sys.argv[2])
          tail = pathlib.Path('/tmp/issue-308-backend-tail.log').read_text(encoding='utf-8', errors='replace')
          pathlib.Path('.github/issue-308-backend-result.json').write_text(
              json.dumps({'ok': False, 'phase': phase, 'status': status, 'logTail': tail}, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY
            git add .github/issue-308-backend-result.json
            if ! git diff --cached --quiet; then
              git commit -m "chore(issue-308): record backend validation failure"
              git pull --rebase origin main
              git push origin HEAD:main
            fi
            cat /tmp/issue-308-backend-tail.log
            exit "$status"
          fi

          rm -f .github/issue-308-backend-result.json
          rm -f scripts/issue-308-backend.py scripts/issue-308-fix1.py scripts/issue-308-fix2.py scripts/issue-308-post1.py scripts/issue-308-post2.py .github/workflows/issue-308-backend.yml
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 1
          fi
          git commit -m "fix(sharing): enforce share security and lifecycle (#308)"
          git pull --rebase origin main
          git push origin HEAD:main
