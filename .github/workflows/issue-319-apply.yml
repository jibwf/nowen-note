          ref_block = '''  const saveInflightRef = useRef<Promise<void> | null>(null);
  // ISSUE-319: content writes are serialized per note. While one request is in flight,
  // later editor updates replace the pending payload with the newest snapshot instead
  // of sending another PUT with the same stale base version.
  const contentSaveQueueRef = useRef<LatestOnlyVersionedSaveQueue<EditorQueuedSavePayload, Note> | null>(null);
  if (!contentSaveQueueRef.current) {
    contentSaveQueueRef.current = new LatestOnlyVersionedSaveQueue(
      (noteId, payload, version) => api.updateNote(noteId, { ...payload, version } as any),
    );
  }
'''
