        icon: <ImageIcon size={14} />,
      },
      {
        id: "export_word",
        label: t("noteList.exportAsWord") || "导出为 Word",
        icon: <FileType2 size={14} />,
      },
      { id: "sep2", label: "", separator: true },
      {
        id: "trash",
        label: t("noteList.moveToTrash") || "移到回收站",
        icon: <Trash2 size={14} />,
        danger: true,
        disabled: note.isLocked === 1,
      },
    ];
  }, [getCachedNote, menu.targetId, t]);'''
          text = replace_once(text, old_menu, new_menu, 'noteMenuItems')

          text = replace_once(
              text,
              '  // 移动笔记本模态框\n  const [moveNbTarget, setMoveNbTarget] = useState<Notebook | null>(null);',
              '  // 移动笔记本模态框\n  const [moveNbTarget, setMoveNbTarget] = useState<Notebook | null>(null);\n  // 笔记本目录内直属笔记的移动目标。\n  const [moveNoteTarget, setMoveNoteTarget] = useState<NoteListItem | null>(null);',
              'move note target state',
          )

          old_cases = '''        case "toggle_lock": {
          const next = targetNote.isLocked === 1 ? 0 : 1;
          await api.updateNote(targetId, { isLocked: next } as any);
          updateCachedNote(targetId, { isLocked: next });
          if (state.activeNote?.id === targetId) {
            actions.setActiveNote({ ...state.activeNote, isLocked: next });
          }
          break;
        }
        case "trash": {'''
          new_cases = '''        case "toggle_lock": {
          const next = targetNote.isLocked === 1 ? 0 : 1;
          await api.updateNote(targetId, { isLocked: next } as any);
          updateCachedNote(targetId, { isLocked: next });
          if (state.activeNote?.id === targetId) {
            actions.setActiveNote({ ...state.activeNote, isLocked: next });
          }
          break;
        }
        case "move": {
          if (targetNote.isLocked === 1) {
            toast.warning(t("common.noteLockedCannotEdit") || t("editor.lockedBanner") || "笔记已锁定");
            break;
          }
          setMoveNoteTarget(targetNote);
          break;
        }
        case "export_md": {
          const toastId = toast.info(t("export.exportingNote", { name: targetNote.title }), 0);
          try {
            const ok = await exportSingleNote(targetId);
            toast.dismiss(toastId);
            ok ? toast.success(t("export.exportComplete")) : toast.error(t("export.exportFailed", { error: "" }));
          } catch (err: any) {
            toast.dismiss(toastId);
            toast.error(err?.message || t("export.exportFailed", { error: String(err) }));
          }
          break;
        }
        case "export_pdf": {
          const toastId = toast.info(t("export.exportingNote", { name: targetNote.title }), 0);
          try {
            const res = await exportSingleNoteAsPDF(targetId);
            toast.dismiss(toastId);
            if (res.ok && (res.mode === "desktop" || res.mode === "web")) {
              toast.success(t("export.exportComplete"));
            } else if (!res.ok && res.mode !== "canceled") {
              toast.error(t("export.exportFailed", { error: (res as { error?: string }).error || "" }));
            }
          } catch (err: any) {
            toast.dismiss(toastId);
            toast.error(err?.message || t("export.exportFailed", { error: String(err) }));
          }
          break;
        }
        case "export_image": {
          const toastId = toast.info(t("export.exportingNote", { name: targetNote.title }), 0);
          try {
            const ok = await exportSingleNoteAsImage(targetId);
            toast.dismiss(toastId);
            ok ? toast.success(t("export.exportComplete")) : toast.error(t("export.exportFailed", { error: "" }));
          } catch (err: any) {
            toast.dismiss(toastId);
            toast.error(err?.message || t("export.exportFailed", { error: String(err) }));
          }
          break;
        }
        case "export_word": {
          const toastId = toast.info(t("export.exportingNote", { name: targetNote.title }), 0);
          try {
            const fresh = await api.getNote(targetId);
            const { exportNoteAsDocx, downloadDocxBlob } = await import("@/lib/wordNoteService");
            const title = fresh.title || t("common.untitledNote") || "未命名笔记";
            const blob = await exportNoteAsDocx(fresh.content || "", title);
            downloadDocxBlob(blob, title);
            toast.dismiss(toastId);
            toast.success(t("export.exportComplete"));
          } catch (err: any) {
            toast.dismiss(toastId);
            toast.error(err?.message || t("export.exportFailed", { error: String(err) }));
          }
          break;
        }
        case "trash": {'''
          text = replace_once(text, old_cases, new_cases, 'sidebar note action cases')

          move_confirm = r'''
  const handleMoveSidebarNoteConfirm = useCallback(async (targetNotebookId: string) => {
    if (!moveNoteTarget) return;
    const sourceNote = moveNoteTarget;
    setMoveNoteTarget(null);

    if (targetNotebookId === sourceNote.notebookId) return;
    if (sourceNote.isLocked === 1) {
      toast.warning(t("common.noteLockedCannotEdit") || t("editor.lockedBanner") || "笔记已锁定");
      return;
    }

    const movedNote = { ...sourceNote, notebookId: targetNotebookId };
    setNotesByNotebookId((prev) => moveNoteInNotebookCache(prev, sourceNote.id, targetNotebookId, movedNote));
    actions.updateNoteInList({ id: sourceNote.id, notebookId: targetNotebookId });
    if (state.activeNote?.id === sourceNote.id) {
      actions.setActiveNote({ ...state.activeNote, notebookId: targetNotebookId });
      actions.setSelectedNotebook(targetNotebookId);
    }

    try {
      await api.updateNote(sourceNote.id, { notebookId: targetNotebookId } as any);
      actions.refreshNotebooks();
      actions.refreshNotes();
      void loadNotesForNotebook(sourceNote.notebookId, true);
      void loadNotesForNotebook(targetNotebookId, true);
    } catch (err: any) {
      console.error("Failed to move sidebar note:", err);
      toast.error(err?.message || t("noteList.bulkMoveFailed", { error: "" }) || "移动笔记失败");
      actions.refreshNotes();
      actions.refreshNotebooks();
      void loadNotesForNotebook(sourceNote.notebookId, true);
      void loadNotesForNotebook(targetNotebookId, true);
    }
  }, [actions, loadNotesForNotebook, moveNoteTarget, state.activeNote, t]);

'''
          text = replace_once(text, '  const handleCreateSidebarNote = useCallback(async (notebookId: string) => {', move_confirm + '  const handleCreateSidebarNote = useCallback(async (notebookId: string) => {', 'handleMoveSidebarNoteConfirm')

          modal_render = '''      {/* Move Notebook Modal */}
      <MoveNotebookModal
        isOpen={!!moveNbTarget}
        notebook={moveNbTarget}
        allNotebooks={state.notebooks}
        onMove={handleMoveNotebookConfirm}
        onClose={() => setMoveNbTarget(null)}
      />'''
          modal_render_new = '''      {/* Move Notebook Modal */}
