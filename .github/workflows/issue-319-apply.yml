          end = source.index(end_marker, start) + len(end_marker)

          replacement = r'''  const handleUpdate = useCallback(async (data: { content?: string; contentText?: string; title: string; _noteId?: string }) => {
    const currentNote = activeNoteRef.current;
    if (!currentNote || currentNote.isLocked || viewLockedIdsRef.current.has(currentNote.id)) return;

    if (data._noteId && data._noteId !== currentNote.id) {
      console.warn("[handleUpdate] noteId mismatch, skipping save", {
        scheduled: data._noteId,
        current: currentNote.id,
      });
      return;
    }

    if (shouldSkipUnchangedTitleOnlyUpdate(currentNote.title, data)) return;

    const payload: EditorQueuedSavePayload = {
      title: data.title,
      contentFormat: currentNote.contentFormat,
      ...(data.content !== undefined ? { content: data.content } : {}),
      ...(data.contentText !== undefined ? { contentText: data.contentText } : {}),
    };

    // Persist every emitted content snapshot before touching the network. A queue failure
    // can therefore coalesce requests without risking the newest local text.
    if (data.content !== undefined) {
      try {
        saveDraft({
          noteId: currentNote.id,
          editorMode: editorModeRef.current,
          content: data.content,
          contentText: data.contentText || "",
          title: data.title,
          baseVersion: currentNote.version,
          savedAt: Date.now(),
        });
      } catch { /* ignore storage quota errors */ }
    }

    try { flagEditing(); } catch {}
    actions.setSyncStatus("saving");

    const applySavedUpdate = (updated: Note, sentPayload: EditorQueuedSavePayload) => {
      const active = activeNoteRef.current;
      if (!active || active.id !== updated.id) return;

      let nextContent = active.content;
      let nextContentText = active.contentText;
      let hasNewerEditorContent = false;

      if (sentPayload.content !== undefined) {
        const editorSnap = getCurrentEditorSnapshot();
        hasNewerEditorContent = !!editorSnap && editorSnap.content !== sentPayload.content;
        if (hasNewerEditorContent && editorSnap) {
          nextContent = editorSnap.content;
          nextContentText = editorSnap.contentText ?? active.contentText;
        } else {
          nextContent = sentPayload.content;
          nextContentText = sentPayload.contentText ?? active.contentText;
        }
      }

      actions.setActiveNote({
        ...active,
        version: updated.version,
        updatedAt: updated.updatedAt,
        title: sentPayload.title,
        content: nextContent,
        contentText: nextContentText,
      });
      actions.updateNoteInList({
        id: updated.id,
        title: updated.title,
        contentText: updated.contentText,
        updatedAt: updated.updatedAt,
        version: updated.version,
      } as any);
      actions.updateNoteTab({
        id: updated.id,
        title: updated.title,
        updatedAt: updated.updatedAt,
        contentFormat: updated.contentFormat || sentPayload.contentFormat,
        isLocked: updated.isLocked,
        isTrashed: updated.isTrashed,
      });
      actions.setLastSynced(new Date().toISOString());
      consecutiveSaveFailRef.current = 0;

      if (hasNewerEditorContent) {
        // A keystroke landed after the last queued request started. Keep the draft and
        // saving state until the editor's next debounce enqueues that newer snapshot.
        actions.setSyncStatus("saving");
        return;
      }

      actions.setSyncStatus("saved");
      if (savedTimerRef.current) clearTimeout(savedTimerRef.current);
      savedTimerRef.current = setTimeout(() => actions.setSyncStatus("idle"), 2000);
      if (sentPayload.content !== undefined) {
        try { clearDraft(currentNote.id); } catch { /* ignore */ }
      }
    };

    const handleSaveFailure = (err: any, attemptedPayload: EditorQueuedSavePayload, fallbackVersion: number) => {
      if (isAborted(err)) return;

      const isConflict = is409Error(err)
        || err?.code === "VERSION_CONFLICT"
        || err?.code === "SAVE_NOT_CONFIRMED";
      console.warn("[EditorPane] save failed:", err);

      // noteSyncSafety already persists true conflicts and already queues writes marked
      // `queued`. Do not create a second offline mutation for either case.
      if (!isConflict && err?.queued !== true) {
        try {
          const snap = editorHandleRef.current?.getSnapshot?.();
          if (snap && typeof snap.content === "string") {
            enqueueOfflineMutation({
              type: "updateNote",
              noteId: currentNote.id,
              url: `/notes/${currentNote.id}`,
              method: "PUT",
              body: {
                title: attemptedPayload.title,
                content: snap.content,
                contentText: snap.contentText,
                contentFormat: attemptedPayload.contentFormat,
                version: Number.isFinite(err?.saveBaseVersion)
                  ? err.saveBaseVersion
                  : fallbackVersion,
              },
            });
          }
        } catch (queueErr) {
          console.warn("[EditorPane] enqueue offline fallback failed:", queueErr);
        }
      }

      if (!isConflict) {
        try {
          consecutiveSaveFailRef.current += 1;
          const now = Date.now();
          const last = lastSaveFailToastAtRef.current[currentNote.id] || 0;
          if (consecutiveSaveFailRef.current >= 2 && now - last > 30000) {
            lastSaveFailToastAtRef.current[currentNote.id] = now;
            toast.error(t("editor.saveFailedDraftKept") || "网络不稳定，已保存本地草稿版本，可稍后恢复或自动上传");
          }
        } catch { /* ignore */ }
      }

      actions.setSyncStatus("error");
    };

    if (data.content !== undefined) {
      const queued = contentSaveQueueRef.current!.enqueue({
        noteId: currentNote.id,
        baseVersion: currentNote.version,
        payload,
      });

      const inflight = (async () => {
        try {
          const saved = await queued;
          // Every coalesced caller waits for the same final snapshot. Only the latest
          // handleUpdate invocation owns UI bookkeeping and draft cleanup.
          if (saveInflightRef.current !== inflight) return;
          applySavedUpdate(saved.result, saved.payload);
        } catch (err: any) {
          if (saveInflightRef.current !== inflight) return;
          handleSaveFailure(err, payload, currentNote.version);
        }
      })();

      saveInflightRef.current = inflight;
      try {
        await inflight;
      } finally {
        if (saveInflightRef.current === inflight) saveInflightRef.current = null;
      }
      return;
    }

    // Title-only updates are rare (blur-driven), but they must wait for an active content
    // drain so they cannot race the version returned by the latest body save.
    const previousContentSave = saveInflightRef.current;
    if (previousContentSave) {
      try { await previousContentSave; } catch { /* handled by its owner */ }
    }

    const latestNote = activeNoteRef.current;
    if (!latestNote || latestNote.id !== currentNote.id) return;

    const sendTitle = (version: number) => api.updateNote(currentNote.id, {
      title: payload.title,
      contentFormat: payload.contentFormat,
      version,
    } as any);

    const inflight = (async () => {
      try {
        const updated = await putWithReconcile({
          initialVersion: latestNote.version,
          send: sendTitle,
          fetchLatestVersion: makeFetchLatestNoteVersion(currentNote.id),
          onAbort: () => activeNoteRef.current?.id !== currentNote.id,
        });
        if (saveInflightRef.current !== inflight) return;
        applySavedUpdate(updated, payload);
      } catch (err: any) {
        if (saveInflightRef.current !== inflight) return;
        handleSaveFailure(err, payload, latestNote.version);
      }
    })();

    saveInflightRef.current = inflight;
    try {
      await inflight;
    } finally {
      if (saveInflightRef.current === inflight) saveInflightRef.current = null;
    }
  }, [actions, flagEditing, t]);'''

