services:
  nowen-note:
    build:
      context: .
      dockerfile: Dockerfile
      # 在 x86 主机上可以通过以下命令构建 arm64 镜像（A311D/RK3566 等板子）：
      #   docker buildx build --platform linux/arm64 -t nowen-note:arm64 --load .
      # 或直接使用统一脚本：scripts/release.sh --build-only --arch arm64
      # compose 原生的 `platforms:` 字段在非 buildx 流程下会被忽略，这里仅做声明。
      platforms:
        - linux/amd64
        - linux/arm64
    image: nowen-note:latest
    # 若在 x86 主机上拉起 arm64 镜像做冒烟测试，取消下一行注释（需已启用 binfmt/qemu）：
    # platform: linux/arm64
    container_name: nowen-note
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - nowen-note-data:/app/data
      # ===========================================================================
      # 【强烈建议】把备份目录挂载到与数据卷**不同的物理介质**上！
      #
      # 默认情况下备份会写入 /app/data/backups（即 nowen-note-data 卷内部），
      # 一旦该卷损坏 / 误删 / 被勒索，数据和备份会一起没。这违反 3-2-1 备份原则
      # （3 份副本、2 种介质、1 份异地）。
      #
      # 推荐做法（任选其一）：
      #   1) 绑定挂载到宿主机另一块磁盘：
      #        - /mnt/backup-disk/nowen-note:/app/backups
      #      然后在 environment 区块设置 BACKUP_DIR=/app/backups
      #   2) 挂载到 NAS / 网络存储路径
      #   3) 创建独立的 docker volume（虽然仍可能在同一物理盘，但至少防 down -v 误删）：
      #        - nowen-note-backup:/app/backups
      #
      # /api/backups/status 会返回 sameVolume=true/false，前端备份页会显示警告横幅。
      # ---------------------------------------------------------------------------
      # 取消下一行注释启用独立备份卷（任选 1/2/3 之一即可）：
      # - nowen-note-backup:/app/backups
    # JWT_SECRET 等敏感变量由容器内 docker-entrypoint.sh 在首启时自动生成并
    # 持久化到 data 卷；用户零配置即可启动。
    # 如需手动覆盖（多实例共享密钥、企业统一密钥管理等），可在同目录下创建
    # .env 文件填入 JWT_SECRET=... ，compose 会自动加载。.env 不存在则跳过。
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/nowen-note.db
      - PORT=3001
      # Docker 默认 UTC；国内用户默认使用上海时区，海外用户可在 .env 中覆盖 TZ=Europe/London 等。
      - TZ=${TZ:-Asia/Shanghai}
      # 高级用户如需跟随宿主机时区，可按宿主系统情况自行挂载 /etc/localtime 或 /usr/share/zoneinfo。
      # 启用上面的独立备份卷后，**必须**同步设置以下变量，否则备份仍会写到 data 卷：
      # - BACKUP_DIR=/app/backups
      # Ollama 地址，如需使用请自行部署 Ollama 并填写正确地址
      # - OLLAMA_URL=http://host.docker.internal:11434
      # Optional attachment object storage (S3 / Cloudflare R2 / MinIO).
      # Keep commented to use /app/data/attachments on the local volume.
      # - ATTACHMENT_STORAGE=s3
      # - S3_ENDPOINT=https://<account-id>.r2.cloudflarestorage.com
      # - S3_REGION=auto
      # - S3_BUCKET=nowen-note
      # - S3_ACCESS_KEY_ID=
      # - S3_SECRET_ACCESS_KEY=
      # - S3_PREFIX=attachments

volumes:
  nowen-note-data:
    driver: local
  # 启用独立备份卷时取消下方注释（与上面 volumes 段对应）：
  # nowen-note-backup:
  #   driver: local
