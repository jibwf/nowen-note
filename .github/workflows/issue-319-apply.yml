name: Apply issue 319 autosave serialization

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/issue-319-apply.yml

permissions:
  contents: write

concurrency:
  group: issue-319-main
  cancel-in-progress: false

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Apply serial autosave implementation
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          root = Path('.')
          editor_path = root / 'frontend/src/components/EditorPane.tsx'
          source = editor_path.read_text(encoding='utf-8')

          import_needle = 'import { canWriteNote } from "@/lib/notePermissions";\n'
          import_line = 'import { LatestOnlyVersionedSaveQueue } from "@/lib/latestOnlyVersionedSaveQueue";\n'
          if import_line not in source:
              assert source.count(import_needle) == 1, 'notePermissions import anchor changed'
              source = source.replace(import_needle, import_needle + import_line, 1)

          type_needle = 'const SHOW_EDITOR_MODE_TOGGLE = false;\n\n'
          type_block = '''const SHOW_EDITOR_MODE_TOGGLE = false;

type EditorQueuedSavePayload = {
  title: string;
  content?: string;
  contentText?: string;
  contentFormat: string;
};

'''
