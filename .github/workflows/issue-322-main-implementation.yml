name: Issue 322 main implementation

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/issue-322-main-implementation.yml

permissions:
  contents: write

concurrency:
  group: issue-322-main-implementation
  cancel-in-progress: false

jobs:
  implement:
    if: github.event.head_commit.message == 'chore(ci): apply issue #322 on main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply staged patches
        run: |
          git apply --check .github/issue322/*.patch
          git apply .github/issue322/*.patch
          git diff --check

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend
        working-directory: frontend
        run: |
          npm run lint
          npm run build
          npm run test:run

      - name: Commit directly to main
        run: |
          rm -rf .github/issue322
          rm -f .github/workflows/issue-322-main-implementation.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(editor): resolve list rendering regressions (#322)"
          git push origin HEAD:main
