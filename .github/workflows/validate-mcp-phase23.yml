name: Validate MCP Phase 2-3

on:
  push:
    branches: [main]
    paths:
      - .github/mcp-phase23-validation-trigger

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Validate builds
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/phase23

          (cd backend && npm ci && npm run build) > /tmp/phase23/backend.log 2>&1
          BACKEND=$?

          (cd frontend && npm ci && npm run build) > /tmp/phase23/frontend.log 2>&1
          FRONTEND=$?

          (cd packages/nowen-mcp && npm ci && npm test) > /tmp/phase23/mcp.log 2>&1
          MCP=$?

          python3 - <<PY
          import json
          from pathlib import Path

          statuses = {
              "backend": int("$BACKEND"),
              "frontend": int("$FRONTEND"),
              "mcp": int("$MCP"),
          }
          logs = {}
          for name in statuses:
              path = Path(f"/tmp/phase23/{name}.log")
              text = path.read_text(encoding="utf-8", errors="replace") if path.exists() else ""
              logs[name] = "\n".join(text.splitlines()[-120:])
          report = {
              "ok": all(code == 0 for code in statuses.values()),
              "statuses": statuses,
              "logs": logs,
          }
          Path(".github/mcp-phase23-validation.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          rm -f .github/mcp-phase23-validation-trigger
          rm -f .github/workflows/validate-mcp-phase23.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test(mcp): record Phase 2-3 validation"
          git push origin HEAD:main
