name: Apply Issue 310 Import Hub IA

on:
  push:
    paths:
      - ".github/workflows/apply-issue-310.yml"

permissions:
  contents: write

concurrency:
  group: apply-issue-310-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply source migration
        run: node .github/scripts/apply-issue-310.mjs

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run focused import hub tests
        working-directory: frontend
        run: npm run test:run -- src/lib/__tests__/importHub.test.ts

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Commit implementation to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            frontend/src/components/DataManager.tsx \
            frontend/src/components/YoudaoImport.tsx \
            frontend/src/components/YoudaoImportLegacy.tsx \
            frontend/src/lib/importHub.ts \
            frontend/src/lib/__tests__/importHub.test.ts \
            frontend/src/i18n/locales/zh-CN.json \
            frontend/src/i18n/locales/en.json
          git diff --cached --check
          git commit -m "feat(import): restructure import hub sources (#310)"
          git pull --rebase origin main
          git push origin HEAD:main
