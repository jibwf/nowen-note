name: Apply API Token Resource Scope

on:
  push:
    branches: [main]
    paths:
      - .github/api-token-scope-trigger

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Patch backend middleware mount
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('backend/src/index.ts')
          text = path.read_text(encoding='utf-8')

          import_line = 'import { enforceApiTokenAccess } from "./middleware/api-token-resource-scope";\n'
          anchor = 'import { initApiTokensTable, looksLikeApiToken, resolveApiToken } from "./lib/api-tokens";\n'
          if import_line not in text:
              if anchor not in text:
                  raise SystemExit('index import anchor not found')
              text = text.replace(anchor, anchor + import_line, 1)

          auth_anchor = '    c.req.raw.headers.set("X-Auth-Mode", "api-token");\n'
          auth_replacement = (
              auth_anchor
              + '    c.req.raw.headers.set("X-Api-Token-Id", resolved.tokenId);\n'
              + '    c.req.raw.headers.set("X-Api-Resource-Mode", resolved.resourceMode);\n'
          )
          if 'X-Api-Token-Id' not in text:
              if auth_anchor not in text:
                  raise SystemExit('API token auth anchor not found')
              text = text.replace(auth_anchor, auth_replacement, 1)

          route_anchor = '// API 路由（受 JWT 保护）\n'
          mount = (
              '// API Token scopes + notebook resource scope enforcement.\n'
              + '// JWT login requests pass through unchanged.\n'
              + 'app.use("/api/*", enforceApiTokenAccess);\n\n'
          )
          if 'app.use("/api/*", enforceApiTokenAccess);' not in text:
              if route_anchor not in text:
                  raise SystemExit('route mount anchor not found')
              text = text.replace(route_anchor, mount + route_anchor, 1)

          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/api-token-scope-trigger
          rm -f .github/workflows/apply-api-token-scope.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(auth): mount API token resource enforcement"
          git push origin HEAD:main
