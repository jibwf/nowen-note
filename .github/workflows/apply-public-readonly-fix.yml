name: Apply public notebook read-only fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-public-readonly-fix.yml

permissions:
  contents: write

concurrency:
  group: apply-public-readonly-fix
  cancel-in-progress: false

jobs:
  apply:
    if: github.repository == 'cropflre/nowen-note'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Rebase onto latest main
        run: |
          git fetch origin main
          git rebase origin/main

      - name: Apply permission and presentation patches
        run: python3 .github/scripts/apply-public-readonly-fix.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run read-only regression tests
        working-directory: frontend
        run: npm run test:run -- src/components/__tests__/PublicNotebookReadOnlyPermissions.test.ts

      - name: Run frontend typecheck
        working-directory: frontend
        run: npx tsc -b

      - name: Commit validated fix to main
        run: |
          rm -f .github/scripts/apply-public-readonly-fix.py
          rm -f .github/workflows/apply-public-readonly-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No validated changes to commit"
            exit 1
          fi
          git commit -m "fix(sharing): enforce public notebook read-only permissions"
          git push origin HEAD:main
