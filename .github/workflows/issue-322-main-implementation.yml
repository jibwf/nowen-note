name: Issue 322 main implementation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  issues: write

jobs:
  implement:
    if: github.event.pull_request.head.ref == 'chore/trigger-issue-322'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - id: apply
        name: Apply deterministic migration
        run: |
          python3 .github/issue322/apply_issue_322.py 2>&1 | tee /tmp/issue322-apply.log
          git diff --check

      - id: install
        name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund 2>&1 | tee /tmp/issue322-install.log

      - id: lint
        name: Lint frontend
        working-directory: frontend
        run: npm run lint 2>&1 | tee /tmp/issue322-lint.log

      - id: build
        name: Build frontend
        working-directory: frontend
        run: npm run build 2>&1 | tee /tmp/issue322-build.log

      - id: test
        name: Test frontend
        working-directory: frontend
        run: npm run test:run 2>&1 | tee /tmp/issue322-test.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-322-validation-logs
          path: /tmp/issue322-*.log
          if-no-files-found: ignore
          retention-days: 1

      - id: commit
        name: Commit directly to main
        run: |
          rm -rf .github/issue322
          rm -f .github/workflows/issue-322-main-implementation.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(editor): resolve list rendering regressions (#322)"
          git push origin HEAD:main

      - name: Report workflow status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="Issue #322 run $GITHUB_RUN_ID: status=${{ job.status }}, apply=${{ steps.apply.outcome }}, install=${{ steps.install.outcome }}, lint=${{ steps.lint.outcome }}, build=${{ steps.build.outcome }}, test=${{ steps.test.outcome }}, commit=${{ steps.commit.outcome }}."
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/322/comments" \
            -d "$(jq -n --arg body "$body" '{body: $body}')"
