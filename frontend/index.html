<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- SEC-ELECTRON-01-E3.4: CSP — 保留严格默认策略，补齐 nowen-note 实际资源来源 -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline';
      img-src 'self' file: data: blob: http: https:;
      font-src 'self' data: blob: http: https:;
      connect-src 'self' http: https: ws: wss:;
      frame-src 'self' blob: data: http: https:;
      media-src 'self' blob: data: http: https:;
      worker-src 'self' blob:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/svg+xml" href="/nowen-note-icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>nowen-note</title>
    <script>
      (function () {
        try {
          var s = localStorage.getItem("nowen-note-skin");
          if (s === "macos") document.documentElement.setAttribute("data-skin", "macos");
        } catch (e) {}
      })();
    </script>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; background: #f8fafc; }
      .app-boot-splash { position: fixed; inset: 0; z-index: 999999; display: flex; align-items: center; justify-content: center; padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left)); box-sizing: border-box; background: radial-gradient(circle at 50% 30%, rgba(37, 99, 235, 0.08), transparent 32%), #f8fafc; color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .app-boot-splash--leaving { opacity: 0; transition: opacity 0.18s ease; pointer-events: none; }
      .app-boot-card { display: flex; flex-direction: column; align-items: center; gap: 10px; width: min(280px, 100%); padding: 28px 32px; border: 1px solid rgba(148, 163, 184, 0.24); border-radius: 20px; background: rgba(255, 255, 255, 0.86); box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08); box-sizing: border-box; backdrop-filter: blur(16px); }
      .app-boot-logo { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, #2563eb, #6366f1); color: #ffffff; font-size: 22px; font-weight: 800; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.28); }
      .app-boot-title { font-size: 16px; font-weight: 700; }
      .app-boot-subtitle { font-size: 13px; color: #64748b; text-align: center; }
      .app-boot-spinner { width: 22px; height: 22px; margin-top: 4px; border: 2px solid rgba(37, 99, 235, 0.18); border-top-color: #2563eb; border-radius: 999px; animation: appBootSpin 0.8s linear infinite; }
      .app-boot-reload { display: none; align-items: center; justify-content: center; margin-top: 8px; padding: 8px 14px; border: 0; border-radius: 999px; background: #2563eb; color: #ffffff; font: inherit; font-size: 13px; cursor: pointer; }

      /* Issue #145 UI guard styles */
      .fixed.inset-0.z-\[10000\] > [role="dialog"][aria-modal="true"] { background: var(--color-bg, #fff) !important; -webkit-backdrop-filter: none !important; backdrop-filter: none !important; }
      .fixed.inset-0.z-\[10000\] > .absolute.inset-0 { -webkit-backdrop-filter: none !important; backdrop-filter: none !important; }
      [class*="bg-app-surface/60"][class*="backdrop-blur-sm"][class*="rounded-2xl"] { isolation: isolate; z-index: 80 !important; }
      [class*="w-[220px]"][class*="bg-app-elevated"][class*="shadow-lg"] { z-index: 9999 !important; }
      [data-radix-scroll-area-viewport] { overflow-x: hidden !important; }
      .nowen-md-editor-status { min-height: 28px; white-space: nowrap; overflow: hidden; }

      @keyframes appBootSpin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .app-boot-spinner { animation: none; } .app-boot-splash--leaving { transition: none; } }
      @media (prefers-color-scheme: dark) { html, body { background: #0f172a; } .app-boot-splash { background: radial-gradient(circle at 50% 30%, rgba(99, 102, 241, 0.16), transparent 34%), #0f172a; color: #e5e7eb; } .app-boot-card { border-color: rgba(148, 163, 184, 0.22); background: rgba(15, 23, 42, 0.78); box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28); } .app-boot-subtitle { color: #94a3b8; } }
    </style>
    <script>
      window.__NOWEN_BOOT_TIMER__ = window.setTimeout(function () {
        var reload = document.getElementById("app-boot-reload");
        var subtitle = document.querySelector(".app-boot-subtitle");
        if (subtitle) subtitle.textContent = "加载时间较长，请检查网络或刷新重试";
        if (reload) { reload.style.display = "inline-flex"; reload.onclick = function () { window.location.reload(); }; }
      }, 12000);
    </script>
  </head>
  <body>
    <div id="app-boot-splash" class="app-boot-splash">
      <div class="app-boot-card">
        <div class="app-boot-logo">N</div>
        <div class="app-boot-title">nowen-note</div>
        <div class="app-boot-subtitle">正在加载你的笔记…</div>
        <div class="app-boot-spinner"></div>
        <button id="app-boot-reload" class="app-boot-reload" type="button">刷新重试</button>
      </div>
    </div>
    <div id="root" style="height:100vh;width:100vw;overflow:hidden;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
