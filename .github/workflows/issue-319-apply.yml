          helper = r'''export interface VersionedSaveResult {
  version: number;
}

export interface VersionedSaveEnvelope<TPayload, TResult extends VersionedSaveResult> {
  noteId: string;
  baseVersion: number;
  payload: TPayload;
  result: TResult;
}

interface SaveWaiter<TPayload, TResult extends VersionedSaveResult> {
  resolve: (value: VersionedSaveEnvelope<TPayload, TResult>) => void;
  reject: (reason: unknown) => void;
}

interface PendingBatch<TPayload, TResult extends VersionedSaveResult> {
  payload: TPayload;
  waiters: Array<SaveWaiter<TPayload, TResult>>;
}

interface QueueState<TPayload, TResult extends VersionedSaveResult> {
  confirmedVersion: number;
  pending: PendingBatch<TPayload, TResult> | null;
  running: Promise<void> | null;
}

function tagSaveError(error: unknown, baseVersion: number): Error & {
  code?: string;
  saveBaseVersion?: number;
} {
  const tagged = error instanceof Error ? error : new Error(String(error));
  try {
    if ((tagged as any).saveBaseVersion === undefined) {
      (tagged as any).saveBaseVersion = baseVersion;
    }
  } catch { /* non-extensible errors are still safe to reject */ }
  return tagged as Error & { code?: string; saveBaseVersion?: number };
}

/**
 * A per-key, latest-only versioned write queue.
 *
 * - Different note IDs may save concurrently.
 * - A single note ID has at most one request in flight.
 * - While a request is in flight, pending payloads are coalesced to the newest value.
 * - The next request always uses the previous server ACK version, not a stale React closure.
 * - All coalesced callers resolve only after the newest pending payload is confirmed.
 */
export class LatestOnlyVersionedSaveQueue<TPayload, TResult extends VersionedSaveResult> {
  private readonly states = new Map<string, QueueState<TPayload, TResult>>();

  constructor(
    private readonly send: (noteId: string, payload: TPayload, version: number) => Promise<TResult>,
  ) {}

  enqueue(input: {
    noteId: string;
    baseVersion: number;
    payload: TPayload;
  }): Promise<VersionedSaveEnvelope<TPayload, TResult>> {
    let state = this.states.get(input.noteId);
    if (!state) {
      state = {
        confirmedVersion: input.baseVersion,
        pending: null,
        running: null,
      };
      this.states.set(input.noteId, state);
    } else if (!state.running && !state.pending) {
      // Conflict resolution or a remote refresh may have advanced the version while idle.
      state.confirmedVersion = Math.max(state.confirmedVersion, input.baseVersion);
    }

    return new Promise((resolve, reject) => {
      const waiter: SaveWaiter<TPayload, TResult> = { resolve, reject };
      if (state!.pending) {
        state!.pending.payload = input.payload;
        state!.pending.waiters.push(waiter);
      } else {
        state!.pending = { payload: input.payload, waiters: [waiter] };
      }
      this.start(input.noteId, state!);
    });
  }

  getConfirmedVersion(noteId: string): number | undefined {
    return this.states.get(noteId)?.confirmedVersion;
  }

  private start(noteId: string, state: QueueState<TPayload, TResult>): void {
    if (state.running) return;
    state.running = this.drain(noteId, state).finally(() => {
      state.running = null;
      if (state.pending) this.start(noteId, state);
    });
  }

  private rejectBatch(
    batch: PendingBatch<TPayload, TResult>,
    error: unknown,
    baseVersion: number,
  ): void {
    const tagged = tagSaveError(error, baseVersion);
    for (const waiter of batch.waiters) waiter.reject(tagged);
  }

  private async drain(noteId: string, state: QueueState<TPayload, TResult>): Promise<void> {
    while (state.pending) {
      const batch = state.pending;
      state.pending = null;
      const baseVersion = state.confirmedVersion;

      let result: TResult;
      try {
        result = await this.send(noteId, batch.payload, baseVersion);
      } catch (error) {
        this.rejectBatch(batch, error, baseVersion);
        if (state.pending) {
          this.rejectBatch(state.pending, error, baseVersion);
          state.pending = null;
        }
        return;
      }

      if (!Number.isFinite(result.version) || result.version <= baseVersion) {
        const error = new Error("Server did not confirm a newer note version") as Error & {
          code?: string;
          saveBaseVersion?: number;
        };
        error.code = "SAVE_NOT_CONFIRMED";
        error.saveBaseVersion = baseVersion;
        this.rejectBatch(batch, error, baseVersion);
        if (state.pending) {
          this.rejectBatch(state.pending, error, baseVersion);
          state.pending = null;
        }
        return;
      }

      state.confirmedVersion = result.version;

      if (state.pending) {
        // The in-flight payload is now durable, but callers should not see "saved" while a
        // newer local snapshot is still pending. Carry every waiter into the latest batch.
        state.pending.waiters.unshift(...batch.waiters);
        continue;
      }

      const envelope: VersionedSaveEnvelope<TPayload, TResult> = {
        noteId,
        baseVersion,
        payload: batch.payload,
        result,
      };
      for (const waiter of batch.waiters) waiter.resolve(envelope);
    }
  }
}
