name: Validate Issue 170 Emoji Picker

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/validate-issue-170.yml

permissions:
  contents: write

concurrency:
  group: validate-issue-170-main
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run emoji picker tests
        working-directory: frontend
        run: npm run test:run -- src/data/__tests__/emojiData.test.ts

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Remove validation workflow
        run: rm .github/workflows/validate-issue-170.yml

      - name: Commit validation cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test(emoji): validate issue 170 implementation"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
