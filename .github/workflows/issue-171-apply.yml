name: Apply issue 171 note icons

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/issue-171-apply.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply note icon implementation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def read_text(path: str):
              p = Path(path)
              data = p.read_bytes()
              has_bom = data.startswith(b"\xef\xbb\xbf")
              return data.decode("utf-8-sig"), has_bom

          def write_text(path: str, text: str, has_bom: bool = False):
              p = Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              payload = text.encode("utf-8")
              if has_bom:
                  payload = b"\xef\xbb\xbf" + payload
              p.write_bytes(payload)

          def replace_once(path: str, old: str, new: str):
              text, bom = read_text(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one match, found {count}: {old[:120]!r}")
              write_text(path, text.replace(old, new, 1), bom)

          # SQLite baseline schema.
          replace_once(
              "backend/src/db/schema.ts",
              "      title TEXT NOT NULL DEFAULT '无标题笔记',\n      content TEXT DEFAULT '{}',",
              "      title TEXT NOT NULL DEFAULT '无标题笔记',\n      icon TEXT,\n      content TEXT DEFAULT '{}',",
          )

          # Versioned migration for existing SQLite databases.
          replace_once(
              "backend/src/db/migrations.ts",
              "  },\n];\n\n/** 当前代码已知的最高 schema 版本（== MIGRATIONS 里 max(version)）。 */",
              "  },\n  // v44: 笔记支持独立 emoji / 短文本图标。NULL 表示未设置，兼容所有存量笔记。\n  {\n    version: 44,\n    name: \"notes-add-icon\",\n    up: (db) => {\n      const cols = db.prepare(\"PRAGMA table_info(notes)\").all() as { name: string }[];\n      if (!cols.some((column) => column.name === \"icon\")) {\n        db.prepare(\"ALTER TABLE notes ADD COLUMN icon TEXT\").run();\n      }\n    },\n  },\n];\n\n/** 当前代码已知的最高 schema 版本（== MIGRATIONS 里 max(version)）。 */",
          )

          # Keep the PostgreSQL target schema aligned with SQLite.
          replace_once(
              "backend/src/db/postgres/schema.sql",
              "    title TEXT NOT NULL DEFAULT '无标题笔记',\n    content TEXT DEFAULT '{}',",
              "    title TEXT NOT NULL DEFAULT '无标题笔记',\n    icon TEXT,\n    content TEXT DEFAULT '{}',",
          )

          # Notes API: validation, list/get/create/update responses and realtime list payload.
          replace_once(
              "backend/src/routes/notes.ts",
              "const app = new Hono();\n",
              "const app = new Hono();\n\nconst MAX_NOTE_ICON_CODE_POINTS = 32;\n\nfunction normalizeNoteIcon(value: unknown): string | null | undefined {\n  if (value === undefined) return undefined;\n  if (value === null) return null;\n  if (typeof value !== \"string\") {\n    throw new Error(\"icon must be a string or null\");\n  }\n  const icon = value.trim();\n  if (!icon) return null;\n  if (/[\\r\\n\\t]/.test(icon) || Array.from(icon).length > MAX_NOTE_ICON_CODE_POINTS) {\n    throw new Error(`icon must contain at most ${MAX_NOTE_ICON_CODE_POINTS} characters without line breaks`);\n  }\n  return icon;\n}\n",
          )
          replace_once(
              "backend/src/routes/notes.ts",
              "  let query = `SELECT notes.id, notes.userId, notes.notebookId, notes.workspaceId, notes.title,\n    notes.contentText, notes.isPinned,",
              "  let query = `SELECT notes.id, notes.userId, notes.notebookId, notes.workspaceId, notes.title, notes.icon,\n    notes.contentText, notes.isPinned,",
          )
          replace_once(
              "backend/src/routes/notes.ts",
              "    ? `id, userId, notebookId, workspaceId, title, isPinned, ${favExpr}, isLocked,\n       isArchived, isTrashed, version, sortOrder, createdAt, updatedAt, trashedAt, contentFormat`\n    : `id, userId, notebookId, workspaceId, title, content, contentText, isPinned, ${favExpr},\n       isLocked, isArchived, isTrashed, version, sortOrder, createdAt, updatedAt, trashedAt, contentFormat`;",
              "    ? `id, userId, notebookId, workspaceId, title, icon, isPinned, ${favExpr}, isLocked,\n       isArchived, isTrashed, version, sortOrder, createdAt, updatedAt, trashedAt, contentFormat`\n    : `id, userId, notebookId, workspaceId, title, icon, content, contentText, isPinned, ${favExpr},\n       isLocked, isArchived, isTrashed, version, sortOrder, createdAt, updatedAt, trashedAt, contentFormat`;",
          )
          replace_once(
              "backend/src/routes/notes.ts",
              "  try {\n    // contentFormat: 区分原生 Markdown 笔记与富文本笔记",
              "  let noteIcon: string | null | undefined;\n  try {\n    noteIcon = normalizeNoteIcon(body.icon);\n  } catch (error) {\n    return c.json({ error: (error as Error).message, code: \"INVALID_NOTE_ICON\" }, 400);\n  }\n\n  try {\n    // contentFormat: 区分原生 Markdown 笔记与富文本笔记",
          )
          replace_once(
              "backend/src/routes/notes.ts",
              "      INSERT INTO notes (id, userId, workspaceId, notebookId, title, content, contentText, contentFormat)\n      VALUES (?, ?, ?, ?, ?, ?, ?, ?)",
              "      INSERT INTO notes (id, userId, workspaceId, notebookId, title, icon, content, contentText, contentFormat)\n      VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)",
          )
          replace_once(
              "backend/src/routes/notes.ts",
              "      id, userId, inheritedWorkspaceId, body.notebookId,\n      body.title || \"无标题笔记\", body.content || defaultContent, body.contentText || \"\",\n      contentFormat,",
              "      id, userId, inheritedWorkspaceId, body.notebookId,\n      body.title || \"无标题笔记\", noteIcon ?? null, body.content || defaultContent, body.contentText || \"\",\n      contentFormat,",
          )
          replace_once(
              "backend/src/routes/notes.ts",
              "    SELECT id, userId, notebookId, workspaceId, title, content, contentText, isPinned,\n      CASE WHEN EXISTS(SELECT 1 FROM favorites f WHERE f.noteId = notes.id AND f.userId = ?) THEN 1 ELSE 0 END AS isFavorite,",
              "    SELECT id, userId, notebookId, workspaceId, title, icon, content, contentText, isPinned,\n      CASE WHEN EXISTS(SELECT 1 FROM favorites f WHERE f.noteId = notes.id AND f.userId = ?) THEN 1 ELSE 0 END AS isFavorite,",
          )
          replace_once(
              "backend/src/routes/notes.ts",
              "  const writeFields = [\"title\", \"content\", \"contentText\", \"contentFormat\", \"notebookId\", \"isPinned\", \"isFavorite\",\n                       \"isArchived\", \"isTrashed\", \"sortOrder\"];",
              "  const writeFields = [\"title\", \"icon\", \"content\", \"contentText\", \"contentFormat\", \"notebookId\", \"isPinned\", \"isFavorite\",\n                       \"isArchived\", \"isTrashed\", \"sortOrder\"];",
          )
          replace_once(
              "backend/src/routes/notes.ts",
              "  if (needsWrite && !hasPermission(permission, \"write\")) {\n    return c.json({ error: \"权限不足\", code: \"FORBIDDEN\" }, 403);\n  }\n\n  // H4: 乐观锁",
              "  if (needsWrite && !hasPermission(permission, \"write\")) {\n    return c.json({ error: \"权限不足\", code: \"FORBIDDEN\" }, 403);\n  }\n\n  let normalizedIcon: string | null | undefined;\n  try {\n    normalizedIcon = normalizeNoteIcon(body.icon);\n  } catch (error) {\n    return c.json({ error: (error as Error).message, code: \"INVALID_NOTE_ICON\" }, 400);\n  }\n\n  // H4: 乐观锁",
          )
          replace_once(
              "backend/src/routes/notes.ts",
              "  const contentFields = [\"title\", \"content\", \"contentText\", \"contentFormat\", \"notebookId\"];",
              "  const contentFields = [\"title\", \"icon\", \"content\", \"contentText\", \"contentFormat\", \"notebookId\"];",
          )
          replace_once(
              "backend/src/routes/notes.ts",
              "  if (body.title !== undefined) { fields.push(\"title = ?\"); params.push(body.title); }\n  if (body.content !== undefined)",
              "  if (body.title !== undefined) { fields.push(\"title = ?\"); params.push(body.title); }\n  if (normalizedIcon !== undefined) { fields.push(\"icon = ?\"); params.push(normalizedIcon); }\n  if (body.content !== undefined)",
          )
          replace_once(
              "backend/src/routes/notes.ts",
              "  const contentFieldNames = [\"title\", \"content\", \"contentText\", \"contentFormat\", \"notebookId\"];",
              "  const contentFieldNames = [\"title\", \"icon\", \"content\", \"contentText\", \"contentFormat\", \"notebookId\"];",
          )
          replace_once(
              "backend/src/routes/notes.ts",
              "    SELECT id, userId, notebookId, workspaceId, title, content, contentText, isPinned,\n      CASE WHEN EXISTS(SELECT 1 FROM favorites f WHERE f.noteId = notes.id AND f.userId = ?) THEN 1 ELSE 0 END AS isFavorite,",
              "    SELECT id, userId, notebookId, workspaceId, title, icon, content, contentText, isPinned,\n      CASE WHEN EXISTS(SELECT 1 FROM favorites f WHERE f.noteId = notes.id AND f.userId = ?) THEN 1 ELSE 0 END AS isFavorite,",
          )
          replace_once(
              "backend/src/routes/notes.ts",
              "          title: n.title,\n          contentText: n.contentText,",
              "          title: n.title,\n          icon: n.icon,\n          contentText: n.contentText,",
          )

          # Search endpoint includes icons for both FTS and CJK fallback paths.
          replace_once(
              "backend/src/routes/search.ts",
              "  title: string;\n  updatedAt: string;",
              "  title: string;\n  icon: string | null;\n  updatedAt: string;",
          )
          replace_once(
              "backend/src/routes/search.ts",
              "      SELECT n.id, n.userId, n.notebookId, n.workspaceId, n.title, n.updatedAt,",
              "      SELECT n.id, n.userId, n.notebookId, n.workspaceId, n.title, n.icon, n.updatedAt,",
          )
          replace_once(
              "backend/src/routes/search.ts",
              "        SELECT n.id, n.userId, n.notebookId, n.workspaceId, n.title, n.contentText, n.updatedAt,",
              "        SELECT n.id, n.userId, n.notebookId, n.workspaceId, n.title, n.icon, n.contentText, n.updatedAt,",
          )
          replace_once(
              "backend/src/routes/search.ts",
              "          title: row.title,\n          updatedAt: row.updatedAt,",
              "          title: row.title,\n          icon: row.icon,\n          updatedAt: row.updatedAt,",
          )

          # Frontend data contracts and SDK contracts remain backward-compatible with optional icon.
          replace_once(
              "frontend/src/types/index.ts",
              "  title: string;\n  content: string;",
              "  title: string;\n  icon?: string | null;\n  content: string;",
          )
          replace_once(
              "frontend/src/types/index.ts",
              "  title: string;\n  contentText: string;\n  /** 内容格式：tiptap-json | markdown | html。用于区分原生 Markdown 笔记与富文本笔记 */",
              "  title: string;\n  icon?: string | null;\n  contentText: string;\n  /** 内容格式：tiptap-json | markdown | html。用于区分原生 Markdown 笔记与富文本笔记 */",
          )
          replace_once(
              "frontend/src/types/index.ts",
              "export interface SearchResult {\n  id: string;\n  title: string;",
              "export interface SearchResult {\n  id: string;\n  title: string;\n  icon?: string | null;",
          )
          replace_once(
              "packages/nowen-sdk/src/types.ts",
              "  title: string;\n  content: string;",
              "  title: string;\n  icon?: string | null;\n  content: string;",
          )
          replace_once(
              "packages/nowen-sdk/src/types.ts",
              "  title: string;\n  contentText: string;\n  isPinned: number;",
              "  title: string;\n  icon?: string | null;\n  contentText: string;\n  isPinned: number;",
          )
          replace_once(
              "packages/nowen-sdk/src/types.ts",
              "  title?: string;\n  content?: string;",
              "  title?: string;\n  icon?: string | null;\n  content?: string;",
          )
          replace_once(
              "packages/nowen-sdk/src/types.ts",
              "export interface UpdateNoteParams {\n  title?: string;\n  content?: string;",
              "export interface UpdateNoteParams {\n  title?: string;\n  icon?: string | null;\n  content?: string;",
          )

          # Note list: preserve icon from search and render it separately from the title.
          replace_once(
              "frontend/src/components/NoteList.tsx",
              "          title: r.title,\n          contentText: stripSearchMarks(r.snippetHtml || r.snippet),",
              "          title: r.title,\n          icon: r.icon ?? null,\n          contentText: stripSearchMarks(r.snippetHtml || r.snippet),",
          )
          replace_once(
              "frontend/src/components/NoteList.tsx",
              "          <h3 className={cn(\n            // 标题强制单行：这里**故意**不用 `truncate`",
              "          {note.icon && (\n            <span\n              className=\"shrink-0 text-base leading-none\"\n              role=\"img\"\n              aria-label={t(\"noteList.noteIcon\", { defaultValue: \"笔记图标\" })}\n            >\n              {note.icon}\n            </span>\n          )}\n          <h3 className={cn(\n            // 标题强制单行：这里**故意**不用 `truncate`",
          )

          # Context menu: add icon action beside rename and open the picker modal.
          replace_once(
              "frontend/src/components/ContextMenu.tsx",
              "  Image as ImageIcon,\n  Pencil,\n  Printer,",
              "  Image as ImageIcon,\n  Pencil,\n  SmilePlus,\n  Printer,",
          )
          replace_once(
              "frontend/src/components/ContextMenu.tsx",
              "import RenameContextNoteModal from \"@/components/RenameContextNoteModal\";",
              "import RenameContextNoteModal from \"@/components/RenameContextNoteModal\";\nimport NoteIconPickerModal from \"@/components/NoteIconPickerModal\";",
          )
          replace_once(
              "frontend/src/components/ContextMenu.tsx",
              "  const [renameNoteId, setRenameNoteId] = useState<string | null>(null);\n  const [submenuParentId",
              "  const [renameNoteId, setRenameNoteId] = useState<string | null>(null);\n  const [iconNoteId, setIconNoteId] = useState<string | null>(null);\n  const [submenuParentId",
          )
          replace_once(
              "frontend/src/components/ContextMenu.tsx",
              "  const renameLabel = isZh ? \"重命名\" : \"Rename\";",
              "  const renameLabel = isZh ? \"重命名\" : \"Rename\";\n  const iconLabel = isZh ? \"设置图标\" : \"Set icon\";",
          )
          old_actions = '''    const shouldOfferRename =
      isNoteMenu &&
      !isTrashNoteMenu &&
      !isBulkNoteMenu &&
      !nextItems.some((item) => item.id === "rename_note");

    if (!shouldOfferRename) return nextItems;

    const lockSource = nextItems.find((item) => item.id === "trash" || item.id === "move");
    const renameItem: ContextMenuItem = {
      id: "rename_note",
      label: renameLabel,
      icon: <Pencil size={14} />,
      disabled: !!lockSource?.disabled,
    };

    const openIndex = nextItems.findIndex((item) => item.id === "open");
    if (openIndex >= 0) {
      return [
        ...nextItems.slice(0, openIndex + 1),
        renameItem,
        ...nextItems.slice(openIndex + 1),
      ];
    }

    return [
      renameItem,
      { id: "sep_context_note_rename", label: "", separator: true },
      ...nextItems,
    ];
'''
          new_actions = '''    const shouldOfferNoteActions =
      isNoteMenu &&
      !isTrashNoteMenu &&
      !isBulkNoteMenu;

    if (!shouldOfferNoteActions) return nextItems;

    const lockSource = nextItems.find((item) => item.id === "trash" || item.id === "move");
    const disabled = !!lockSource?.disabled;
    const quickItems: ContextMenuItem[] = [
      {
        id: "rename_note",
        label: renameLabel,
        icon: <Pencil size={14} />,
        disabled,
      },
      {
        id: "change_note_icon",
        label: iconLabel,
        icon: <SmilePlus size={14} />,
        disabled,
      },
    ];

    const existingIds = new Set(nextItems.map((item) => item.id));
    const itemsToInsert = quickItems.filter((item) => !existingIds.has(item.id));
    if (itemsToInsert.length === 0) return nextItems;

    const openIndex = nextItems.findIndex((item) => item.id === "open");
    if (openIndex >= 0) {
      return [
        ...nextItems.slice(0, openIndex + 1),
        ...itemsToInsert,
        ...nextItems.slice(openIndex + 1),
      ];
    }

    return [
      ...itemsToInsert,
      { id: "sep_context_note_quick", label: "", separator: true },
      ...nextItems,
    ];
'''
          replace_once("frontend/src/components/ContextMenu.tsx", old_actions, new_actions)
          replace_once(
              "frontend/src/components/ContextMenu.tsx",
              "    renameLabel,\n    t,",
              "    iconLabel,\n    renameLabel,\n    t,",
          )
          replace_once(
              "frontend/src/components/ContextMenu.tsx",
              "    if (actionId === \"rename_note\" && isNoteMenu && currentTargetId) {\n      setRenameNoteId(currentTargetId);\n      closeOwnerMenu();\n      return;\n    }\n\n    if (!isInlineNotebookTreeNoteMenu",
              "    if (actionId === \"rename_note\" && isNoteMenu && currentTargetId) {\n      setRenameNoteId(currentTargetId);\n      closeOwnerMenu();\n      return;\n    }\n\n    if (actionId === \"change_note_icon\" && isNoteMenu && currentTargetId) {\n      setIconNoteId(currentTargetId);\n      closeOwnerMenu();\n      return;\n    }\n\n    if (!isInlineNotebookTreeNoteMenu",
          )
          replace_once(
              "frontend/src/components/ContextMenu.tsx",
              "      <RenameContextNoteModal\n        noteId={renameNoteId}\n        initialTitle={header}\n        onClose={() => setRenameNoteId(null)}\n      />",
              "      <RenameContextNoteModal\n        noteId={renameNoteId}\n        initialTitle={header}\n        onClose={() => setRenameNoteId(null)}\n      />\n      <NoteIconPickerModal\n        noteId={iconNoteId}\n        onClose={() => setIconNoteId(null)}\n      />",
          )

          icon_modal = r'''import React, { useEffect, useMemo, useRef, useState } from "react";
import { SmilePlus, Trash2, X } from "lucide-react";
import { Button } from "@/components/ui/button";
import { useApp, useAppActions } from "@/store/AppContext";
import { api } from "@/lib/api";
import { toast } from "@/lib/toast";
import { useTranslation } from "react-i18next";

const PRESET_ICONS = [
  "📝", "📌", "📚", "💡", "✅", "⭐", "🔥", "🎯",
  "🚀", "💻", "🧠", "📅", "💼", "🏠", "❤️", "🔖",
  "📖", "✍️", "🗂️", "🔒", "🌱", "🎨", "📊", "🧩",
  "🔬", "🛠️", "🎵", "🌍", "💬", "📎", "🧪", "☕",
] as const;

const MAX_ICON_CODE_POINTS = 32;

interface NoteIconPickerModalProps {
  noteId: string | null;
  onClose: () => void;
}

function normalizeIcon(value: string): string {
  return value.trim();
}

export default function NoteIconPickerModal({ noteId, onClose }: NoteIconPickerModalProps) {
  const { state } = useApp();
  const actions = useAppActions();
  const { t, i18n } = useTranslation();
  const inputRef = useRef<HTMLInputElement>(null);
  const [note, setNote] = useState<any | null>(null);
  const [icon, setIcon] = useState("");
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  const isZh = (i18n.resolvedLanguage || i18n.language || "").toLowerCase().startsWith("zh");
  const copy = useMemo(() => isZh ? {
    title: "设置笔记图标",
    subtitle: "选择 emoji，或粘贴一个自定义短图标。",
    custom: "自定义图标",
    placeholder: "例如：📝",
    remove: "移除图标",
    save: "保存",
    success: "笔记图标已更新",
    failed: "更新笔记图标失败",
    locked: "笔记已锁定，无法修改图标",
    tooLong: `图标最多 ${MAX_ICON_CODE_POINTS} 个字符，且不能包含换行`,
  } : {
    title: "Set note icon",
    subtitle: "Choose an emoji or paste a short custom icon.",
    custom: "Custom icon",
    placeholder: "For example: 📝",
    remove: "Remove icon",
    save: "Save",
    success: "Note icon updated",
    failed: "Failed to update note icon",
    locked: "This note is locked and its icon cannot be changed",
    tooLong: `The icon must be at most ${MAX_ICON_CODE_POINTS} characters without line breaks`,
  }, [isZh]);

  useEffect(() => {
    if (!noteId) {
      setNote(null);
      setIcon("");
      setError("");
      return;
    }

    let cancelled = false;
    setLoading(true);
    setError("");
    api.getNote(noteId)
      .then((fresh) => {
        if (cancelled) return;
        setNote(fresh);
        setIcon(fresh.icon || "");
      })
      .catch((err: any) => {
        if (cancelled) return;
        console.error("Failed to load note before setting icon:", err);
        toast.error(err?.message || copy.failed);
        onClose();
      })
      .finally(() => {
        if (!cancelled) setLoading(false);
      });

    return () => {
      cancelled = true;
    };
  }, [noteId, onClose, copy.failed]);

  useEffect(() => {
    if (!noteId) return;
    const handleKey = (event: KeyboardEvent) => {
      if (event.key === "Escape" && !saving) onClose();
    };
    window.addEventListener("keydown", handleKey);
    return () => window.removeEventListener("keydown", handleKey);
  }, [noteId, onClose, saving]);

  if (!noteId) return null;

  const normalizedIcon = normalizeIcon(icon);
  const originalIcon = normalizeIcon(note?.icon || "");
  const invalid = /[\r\n\t]/.test(normalizedIcon) || Array.from(normalizedIcon).length > MAX_ICON_CODE_POINTS;
  const unchanged = !!note && normalizedIcon === originalIcon;
  const canSave = !!note && !loading && !saving && !invalid && !unchanged && note.isLocked !== 1;

  const handleSave = async (nextValue = normalizedIcon) => {
    if (!note || loading || saving || note.isLocked === 1) return;
    const nextIcon = normalizeIcon(nextValue);
    if (/[\r\n\t]/.test(nextIcon) || Array.from(nextIcon).length > MAX_ICON_CODE_POINTS) {
      setError(copy.tooLong);
      inputRef.current?.focus();
      return;
    }
    if (nextIcon === originalIcon) {
      onClose();
      return;
    }

    setSaving(true);
    setError("");
    try {
      const updated = await api.updateNote(note.id, { icon: nextIcon || null } as any);
      const resolvedIcon = updated?.icon || null;
      const patch = {
        id: note.id,
        icon: resolvedIcon,
        ...(typeof updated?.version === "number" ? { version: updated.version } : {}),
        ...(updated?.updatedAt ? { updatedAt: updated.updatedAt } : {}),
      };
      actions.updateNoteInList(patch);
      if (state.activeNote?.id === note.id) {
        actions.setActiveNote({ ...state.activeNote, ...patch } as any);
      }
      actions.refreshNotes();
      toast.success(copy.success);
      onClose();
    } catch (err: any) {
      console.error("Failed to update note icon:", err);
      const message = err?.message || copy.failed;
      setError(message);
      toast.error(message);
    } finally {
      setSaving(false);
    }
  };

  return (
    <div className="fixed inset-0 z-[110] flex items-center justify-center p-4">
      <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={saving ? undefined : onClose} />
      <div className="relative w-full max-w-[460px] overflow-hidden rounded-xl border border-app-border bg-app-elevated shadow-2xl">
        <div className="flex items-center justify-between border-b border-app-border px-4 py-3">
          <div className="flex min-w-0 items-center gap-2">
            <SmilePlus size={16} className="shrink-0 text-accent-primary" />
            <div className="min-w-0">
              <div className="truncate text-sm font-medium text-tx-primary">{copy.title}</div>
              <div className="mt-0.5 truncate text-[11px] text-tx-tertiary">{copy.subtitle}</div>
            </div>
          </div>
          <button
            type="button"
            disabled={saving}
            onClick={onClose}
            className="rounded-md p-1 text-tx-tertiary hover:bg-app-hover disabled:opacity-40"
            aria-label={t("common.close")}
          >
            <X size={16} />
          </button>
        </div>

        <div className="space-y-4 px-4 py-4">
          <div className="grid grid-cols-8 gap-2 sm:grid-cols-10">
            {PRESET_ICONS.map((preset) => {
              const selected = normalizedIcon === preset;
              return (
                <button
                  key={preset}
                  type="button"
                  disabled={loading || saving || note?.isLocked === 1}
                  onClick={() => {
                    setIcon(preset);
                    setError("");
                  }}
                  className={`flex aspect-square items-center justify-center rounded-lg border text-xl transition-colors ${selected
                    ? "border-accent-primary bg-accent-primary/10"
                    : "border-app-border bg-app-bg hover:border-accent-primary/40 hover:bg-app-hover"}`}
                  aria-pressed={selected}
                >
                  {preset}
                </button>
              );
            })}
          </div>

          <label className="block space-y-1.5">
            <span className="text-xs font-medium text-tx-secondary">{copy.custom}</span>
            <input
              ref={inputRef}
              type="text"
              value={icon}
              disabled={loading || saving || note?.isLocked === 1}
              onChange={(event) => {
                setIcon(event.target.value);
                if (error) setError("");
              }}
              placeholder={copy.placeholder}
              className="w-full rounded-lg border border-app-border bg-app-bg px-3 py-2 text-lg text-tx-primary outline-none transition-colors placeholder:text-sm placeholder:text-tx-tertiary focus:border-accent-primary focus:ring-2 focus:ring-accent-primary/15 disabled:cursor-not-allowed disabled:opacity-60"
            />
          </label>

          {invalid && <p className="text-xs text-red-500">{copy.tooLong}</p>}
          {error && <p className="text-xs text-red-500">{error}</p>}
          {note?.isLocked === 1 && <p className="text-xs text-amber-500">{copy.locked}</p>}
        </div>

        <div className="flex items-center justify-between border-t border-app-border px-4 py-3">
          <Button
            type="button"
            variant="ghost"
            size="sm"
            disabled={loading || saving || note?.isLocked === 1 || !originalIcon}
            onClick={() => void handleSave("")}
            className="text-red-500 hover:text-red-600"
          >
            <Trash2 size={14} className="mr-1.5" />
            {copy.remove}
          </Button>
          <div className="flex items-center gap-2">
            <Button type="button" variant="ghost" size="sm" onClick={onClose} disabled={saving}>
              {t("common.cancel")}
            </Button>
            <Button
              type="button"
              size="sm"
              disabled={!canSave}
              onClick={() => void handleSave()}
              className="bg-accent-primary text-white hover:bg-accent-primary/90 disabled:opacity-40"
            >
              {saving ? t("common.loading") : copy.save}
            </Button>
          </div>
        </div>
      </div>
    </div>
  );
}
