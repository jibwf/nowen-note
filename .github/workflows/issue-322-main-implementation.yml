name: Issue 322 main implementation

# One-shot runner. A successful run deletes this workflow and all staged patches.
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

concurrency:
  group: issue-322-main-implementation
  cancel-in-progress: true

jobs:
  implement:
    if: github.event.issue.number == 322 && github.event.comment.body == '/run-issue-322'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - id: apply
        name: Apply staged patches
        shell: bash
        run: |
          set -o pipefail
          : > /tmp/issue322-apply-error.txt
          for patch in .github/issue322/*.patch; do
            echo "Checking $patch"
            if ! git apply --check "$patch" 2> /tmp/issue322-current-error.txt; then
              {
                echo "Failed patch: $patch"
                cat /tmp/issue322-current-error.txt
              } | tee /tmp/issue322-apply-error.txt
              exit 1
            fi
            git apply "$patch"
          done
          git diff --check

      - id: install
        name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - id: validate
        name: Validate frontend
        working-directory: frontend
        run: |
          npm run lint
          npm run build
          npm run test:run

      - id: commit
        name: Commit directly to main
        run: |
          rm -rf .github/issue322
          rm -f .github/workflows/issue-322-main-implementation.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(editor): resolve list rendering regressions (#322)"
          git push origin HEAD:main

      - name: Report workflow status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          body="Issue #322 implementation run $GITHUB_RUN_ID finished with status: ${{ job.status }}. Steps — apply: ${{ steps.apply.outcome }}, install: ${{ steps.install.outcome }}, validate: ${{ steps.validate.outcome }}, commit: ${{ steps.commit.outcome }}."
          if [ -s /tmp/issue322-apply-error.txt ]; then
            body="$body

\`\`\`
$(cat /tmp/issue322-apply-error.txt)
\`\`\`"
          fi
          gh issue comment 322 --repo "$GITHUB_REPOSITORY" --body "$body"
