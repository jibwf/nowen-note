name: Apply Issue 201 image transforms

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/issue-201-apply.yml

permissions:
  contents: write

concurrency:
  group: issue-201-main-implementation
  cancel-in-progress: false

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply source patch
        run: python3 scripts/issue-201-apply.py

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Run image transform tests
        working-directory: frontend
        run: npx vitest run src/lib/__tests__/imageNodeTransform.test.ts src/lib/__tests__/imageExperience.test.ts

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Commit verified implementation
        run: |
          rm -f scripts/issue-201-apply.py .github/workflows/issue-201-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(images): persist editor rotation and flipping (#201)"
          git pull --rebase origin main
          git push origin HEAD:main
